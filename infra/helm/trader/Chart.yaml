apiVersion: v2
name: trader
description: Algebraic Topology Trading Platform
type: application
version: 0.7.1
appVersion: "1.0.0"

# Subcharts are vendored in charts/ (not fetched from a repo). They must be
# declared here so `helm lint` passes — without this, lint errors with
# "chart metadata is missing these dependencies". `version: ">=0.0.0"` matches
# whatever version each vendored subchart's Chart.yaml carries, so a subchart
# version bump never needs a matching edit here; `repository` is omitted because
# the charts are bundled, not downloaded (no Chart.lock / `helm dep update` needed).
dependencies:
  - name: auth-service
    version: ">=0.0.0"
  - name: market-data-service
    version: ">=0.0.0"
  - name: strategy-engine
    version: ">=0.0.0"
  - name: signal-service
    version: ">=0.0.0"
  - name: notification-service
    version: ">=0.0.0"
  - name: trading-service
    version: ">=0.0.0"
  - name: portfolio-service
    version: ">=0.0.0"
  - name: backtest-engine
    version: ">=0.0.0"
  - name: fundamentals-ingestion
    version: ">=0.0.0"
  - name: fundamentals-api
    version: ">=0.0.0"
  - name: frontend-web
    version: ">=0.0.0"
