{{/*
  One ServiceMonitor per trader service that exposes /metrics, so kube-prometheus-stack scrapes
  them all and (with remote_write) ships the samples to Mimir. The TS services get /metrics from
  @trader/core's shared `mountMetrics` (Node runtime metrics + any business counters); strategy-engine,
  fundamentals-ingestion, fundamentals-api, and fundamentals-harvester expose prometheus_client metrics
  (a liveness gauge + a per-route request-latency histogram — the API p50/p95 source). `targetPort`
  (numeric) is used so we don't have to name the Service port on every subchart. backtest-engine is
  intentionally omitted — it's a low-traffic job runner with no app /metrics; its pod-level metrics
  come from kube-state-metrics.

  fundamentals-ingestion's HEAVY ingest counters (filings/facts ingested, ingestion lag, factor-gen
  duration) are NOT here: that work runs in the separate `fundamentals-ingest` CronJob/backfill-Job
  pods — short-lived batch containers a ServiceMonitor can't reliably scrape. Scraping their last-run
  gauges is a documented follow-up (Pushgateway, or a last_run table the read API surfaces); see
  CLAUDE.md "Fundamentals (PIT warehouse)". The Deployment scrape below gives liveness + trigger/read
  latency; the Jobs' health is observed via kube-state-metrics (job success/failure + last-completion).
*/}}
{{- $svcs := list
  (dict "app" "auth-service"         "port" 3001)
  (dict "app" "market-data-service"  "port" 3002)
  (dict "app" "signal-service"       "port" 3003)
  (dict "app" "notification-service" "port" 3004)
  (dict "app" "trading-service"      "port" 3005)
  (dict "app" "portfolio-service"    "port" 3006)
  (dict "app" "strategy-engine"      "port" 8000)
  (dict "app" "fundamentals-ingestion" "port" 8010)
  (dict "app" "fundamentals-api"       "port" 8011)
  (dict "app" "fundamentals-harvester" "port" 8012)
-}}
{{- range $svc := $svcs }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: trader-{{ $svc.app }}
  namespace: {{ $.Release.Namespace }}
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
  selector:
    matchLabels:
      app: {{ $svc.app }}
  endpoints:
    - targetPort: {{ $svc.port }}
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
{{- end }}
