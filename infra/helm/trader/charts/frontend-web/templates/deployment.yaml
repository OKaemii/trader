apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
        - name: frontend-web
          image: {{ .Values.image | default "trader/frontend-web:latest" }}
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://trader.local"
            - name: GATEWAY_URL
              value: "http://api-gateway"
            # Set to "true" only when the portal is fronted by HTTPS — browsers reject
            # Secure cookies over plain HTTP, which breaks the login flow.
            - name: COOKIE_SECURE
              value: {{ .Values.cookieSecure | default "false" | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
