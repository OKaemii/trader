apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # NOTE: this Ingress is deliberately STILL named `fundamentals-ingestion` even though it now lives in
  # the harvester chart. It previously lived in the (now-deleted) fundamentals-ingestion chart and was
  # repointed IN PLACE to fundamentals-harvester:8012 (#205); the PIT-lake epic closer (Task 24 / #208)
  # retires the ingestion chart, so the Ingress object moves here.
  #
  # Why KEEP the name rather than rename to `fundamentals-harvester`: nginx's duplicate-path admission
  # webhook rejects a SECOND Ingress claiming the same (host, path) — a brand-new
  # `fundamentals-harvester` Ingress created while the old `fundamentals-ingestion` one still existed
  # would fail the whole `helm upgrade` ("path /admin/api/fundamentals-ingest is already defined in
  # ingress trader/fundamentals-ingestion"). Helm tracks objects by (kind, namespace, NAME), so keeping
  # the same object name means Helm sees ONE Ingress that simply changed which chart renders it — an
  # in-place UPDATE (same path, same backend), never a create+delete collision across the cutover.
  name: fundamentals-ingestion
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: trader.local
      http:
        paths:
          # `/admin/api/fundamentals-ingest` — the prefix the portal Operations › PIT Fundamentals panel
          # fans out to (status / config / freshness / runs / force-sweep). Backed by the
          # fundamentals-HARVESTER (the per-CIK Parquet lake's write path + its thin status API,
          # src/app.py on :8012). nginx uses longest-prefix matching, and `/admin/api/fundamentals-ingest`,
          # `/admin/api/fundamentals-pit` (fundamentals-api), and the bare `/admin/api/fundamentals`
          # (307 → portal) are mutually non-prefixing, so each resolves to its own backend with no rewrite.
          - path: /admin/api/fundamentals-ingest
            pathType: Prefix
            backend:
              service:
                name: fundamentals-harvester
                port:
                  number: 8012
