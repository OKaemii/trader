apiVersion: v1
kind: Service
metadata:
  name: fundamentals-harvester
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: fundamentals-harvester
  ports:
    - name: http
      # Port 8012 — distinct from strategy-engine (8000), backtest-engine (8001),
      # fundamentals-ingestion (8010), and fundamentals-api (8011). The status surface
      # (src/app.py) + probes target the same number; the portal Operations panel reaches
      # it in-cluster via this Service (the /admin/api/fundamentals-ingest/* prefix).
      port: 8012
      targetPort: 8012
      protocol: TCP
