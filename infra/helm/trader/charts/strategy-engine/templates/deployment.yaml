apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy-engine
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: strategy-engine
  template:
    metadata:
      labels:
        app: strategy-engine
    spec:
      containers:
        - name: strategy-engine
          image: {{ .Values.image | default "trader/strategy-engine:latest" }}
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: INTERNAL_SECRET
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            # Used by infrastructure/live_config.py to read portal_market_config for
            # the bar-frequency hot-swap (via the config:invalidated pubsub). Without
            # this, motor falls back to localhost and silently fails — engine keeps
            # running on env defaults but loses the portal-override path.
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb-headless:27017/trader?authSource=trader&directConnection=true"
            - name: BAR_FREQUENCY
              value: {{ .Values.global.env.barFrequency | default "daily" | quote }}
            - name: SIGNAL_ORDER_TYPE
              value: {{ .Values.global.env.signalOrderType | default "Limit" | quote }}
            - name: ACTIVE_STRATEGY
              value: {{ .Values.global.env.activeStrategy | default "factor_rank_v1" | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
