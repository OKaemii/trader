apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: portfolio-service
  template:
    metadata:
      labels:
        app: portfolio-service
    spec:
      containers:
        - name: portfolio-service
          image: {{ .Values.image | default "trader/portfolio-service:latest" }}
          imagePullPolicy: Never
          ports:
            - containerPort: 3006
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            - name: LOG_LEVELS
              value: {{ .Values.global.env.logLevels | default "error,warn" | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: REDIS_PASSWORD
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb-headless:27017/trader?authSource=trader&directConnection=true"
            - name: TIMESCALEDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: TIMESCALEDB_PASSWORD
            - name: TIMESCALE_URL
              value: "postgresql://trader:$(TIMESCALEDB_PASSWORD)@timescaledb-postgresql:5432/trader_ts"
            - name: BARS_BACKEND
              value: {{ .Values.global.env.barsBackend | default "mongo" | quote }}
            - name: TRADING_MODE
              value: {{ .Values.global.env.tradingMode | default "Paper" | quote }}
            - name: ACTIVE_STRATEGY
              value: {{ .Values.global.env.activeStrategy | default "factor_rank_v1" | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 10
            periodSeconds: 10
