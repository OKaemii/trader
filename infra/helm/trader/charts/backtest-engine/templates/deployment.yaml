apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtest-engine
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backtest-engine
  template:
    metadata:
      labels:
        app: backtest-engine
    spec:
      containers:
        - name: backtest-engine
          image: {{ .Values.image | default "trader/backtest-engine:latest" }}
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb-headless:27017/trader?authSource=trader&directConnection=true"
            - name: MONGODB_DB
              value: trader
          resources:
            requests:
              ephemeral-storage: "256Mi"
            limits:
              ephemeral-storage: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
