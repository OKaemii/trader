apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtest-engine
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backtest-engine
  template:
    metadata:
      labels:
        app: backtest-engine
    spec:
      containers:
        - name: backtest-engine
          image: {{ .Values.image | default (printf "%strader-backtest-engine:%s" (.Values.global.imageRegistry | default "") (.Values.global.imageTag | default "latest")) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb-headless:27017/trader?authSource=trader&directConnection=true"
            - name: MONGODB_DB
              value: trader
            # Plain-English report explanations (DeepSeek, OpenAI-compatible). Same key the
            # notification-service uses. optional so the pod still boots if it's unset — the
            # explainer just no-ops and the portal shows reports without the write-up.
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: DEEPSEEK_API_KEY
                  optional: true
            - name: TIMESCALEDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: TIMESCALEDB_PASSWORD
            - name: TIMESCALE_URL
              value: "postgresql://trader:$(TIMESCALEDB_PASSWORD)@timescaledb-postgresql:5432/trader_ts"
            - name: BARS_BACKEND
              value: {{ .Values.global.env.barsBackend | default "mongo" | quote }}
            # Drives the replay validator's rolling-window sizing via quant-core's strategy
            # factory (daily → ROLLING_WINDOW_BARS=300, the 12-1 momentum floor). The Phase-4
            # backtest reads multi-year adjusted daily direct from Yahoo (YahooDailyBarsReader),
            # so it needs multi-year history per fold; short windows return insufficient_history.
            # It needs no
            # MARKET_DATA_SERVICE_URL — the research data path is decoupled from the live one.
            - name: BAR_FREQUENCY
              value: {{ .Values.global.env.barFrequency | default "daily" | quote }}
            # Validation/backtest job parallelism — the MCPT validator + walk-forward backtest fan
            # their independent permutation/fold work across a process pool. See
            # agent-docs/plans/queued-validation-jobs-progress-tracking.md.
            - name: BACKTEST_MAX_WORKERS
              value: {{ .Values.global.env.backtestMaxWorkers | default "" | quote }}
            - name: BACKTEST_MIN_PARALLEL
              value: {{ .Values.global.env.backtestMinParallel | default "16" | quote }}
            - name: BACKTEST_BLAS_THREADS
              value: {{ .Values.global.env.backtestBlasThreads | default "1" | quote }}
            # PIT fundamentals LAKE dir — a `fundamentals_source=warehouse` backtest reads per-CIK
            # Parquet from this path directly (src/main.py `_build_pit_fundamentals` → LakePitFundamentals
            # over the lake Store), replacing the old fundamentals warehouse-snapshot branch. The code
            # default already matches this; set here for explicitness alongside the RO mount below. A cold
            # lake (pre-bootstrap) degrades to {} per name, never an error.
            - name: FUNDAMENTALS_LAKE_DIR
              value: /srv/fundamentals-lake
          # Mount the research warehouse PV so the DuckDB reader
          # (src/infrastructure/duckdb_reader.py) can open the Parquet snapshots
          # written daily by the warehouse-snapshot CronJob. Read-only by
          # convention — the backtest engine never writes to the warehouse.
          volumeMounts:
            - name: warehouse
              mountPath: /srv/warehouse
              readOnly: true
            # The PIT fundamentals lake (per-CIK Parquet written by fundamentals-harvester).
            # Read-only — the backtest engine never writes the lake; the harvester is its sole writer.
            - name: fundamentals-lake
              mountPath: /srv/fundamentals-lake
              readOnly: true
          resources:
            requests:
              # No CPU *limit* by design — a limit CFS-throttles the validation/backtest process
              # pool and defeats the parallelism. The request is a scheduling floor for the burst.
              cpu: "2"
              ephemeral-storage: "256Mi"
            limits:
              ephemeral-storage: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: warehouse
          persistentVolumeClaim:
            claimName: warehouse-pvc
        - name: fundamentals-lake
          persistentVolumeClaim:
            claimName: fundamentals-lake-pvc
