apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: signal-service
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: trader.local
      http:
        paths:
          - path: /api/signals
            pathType: Prefix
            backend:
              service:
                name: signal-service
                port:
                  number: 3003
          - path: /admin/api/signals
            pathType: Prefix
            backend:
              service:
                name: signal-service
                port:
                  number: 3003
          # signal-service owns /admin/api/market/* (research module — market summary, narrative,
          # notes). Distinct path element from market-data-service's /admin/api/market-data/*, so the
          # Prefix matches never collide (k8s matches on path-element boundaries).
          - path: /admin/api/market
            pathType: Prefix
            backend:
              service:
                name: signal-service
                port:
                  number: 3003
          - path: /ws/api/signals
            pathType: Prefix
            backend:
              service:
                name: signal-service
                port:
                  number: 3003
