apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: signal-service
  template:
    metadata:
      labels:
        app: signal-service
    spec:
      containers:
        - name: signal-service
          image: {{ .Values.image | default "trader/signal-service:latest" }}
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: REDIS_PASSWORD
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb:27017/trader"
            - name: TRADING_MODE
              value: paper
            - name: BAR_FREQUENCY
              value: daily
            - name: EXECUTION_MODE
              value: t212
            - name: ACTIVE_STRATEGY
              value: factor_rank_v1
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
