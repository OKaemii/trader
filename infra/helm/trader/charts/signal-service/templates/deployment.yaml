apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: signal-service
  template:
    metadata:
      labels:
        app: signal-service
    spec:
      containers:
        - name: signal-service
          image: {{ .Values.image | default "trader/signal-service:latest" }}
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            - name: LOG_LEVELS
              value: {{ .Values.global.env.logLevels | default "error,warn" | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: REDIS_PASSWORD
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb-headless:27017/trader?authSource=trader&directConnection=true"
            - name: TIMESCALEDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: TIMESCALEDB_PASSWORD
            - name: TIMESCALE_URL
              value: "postgresql://trader:$(TIMESCALEDB_PASSWORD)@timescaledb-postgresql:5432/trader_ts"
            - name: BARS_BACKEND
              value: {{ .Values.global.env.barsBackend | default "mongo" | quote }}
            - name: TRADING_MODE
              value: {{ .Values.global.env.tradingMode | default "Paper" | quote }}
            - name: SIGNAL_ORDER_TYPE
              value: {{ .Values.global.env.signalOrderType | default "Limit" | quote }}
            - name: ACTIVE_STRATEGY
              value: {{ .Values.global.env.activeStrategy | default "factor_rank_v1" | quote }}
            - name: VOL_TARGET
              value: {{ .Values.global.env.volTarget | default "0.10" | quote }}
            - name: MIN_ACTIONABLE_CONFIDENCE
              value: {{ .Values.global.env.minActionableConfidence | default "0.30" | quote }}
            # Singleton-positive guardrail: below this many positive composite scores in
            # the cross-section, the p95 divisor collapses to "the score itself" and every
            # emitted confidence pins to 1.0 — operator sees 100%-confidence BUYs whose
            # displayed score rounds to 0.000. Falling back to an absolute divisor of 1.0
            # keeps the math honest on sparse universes.
            - name: MIN_POSITIVE_PEERS
              value: {{ .Values.global.env.minPositivePeers | default "5" | quote }}
            # |composite_score| floor — below this, confidence is forced to 0 (BUY gate
            # then drops the signal). Covers the factor-collapse case where every score
            # rounds to ~0 even on a healthy cross-section.
            - name: MIN_SCORE_EPSILON
              value: {{ .Values.global.env.minScoreEpsilon | default "0.1" | quote }}
            # WP2.3: comma-separated stream list. Keeps the legacy `signals:strategy`
            # attached during cutover so any in-flight messages drain, then layers on
            # one per-worker stream `signals:strategy:{mode}:{strategyId}` derived from
            # global.strategies. Falls back to legacy-only when strategies isn't set.
            - name: STRATEGY_INPUT_STREAMS
{{- $streams := list "signals:strategy" -}}
{{- range (.Values.global.strategies | default (list)) }}
  {{- $streams = append $streams (printf "signals:strategy:%s:%s" .mode .strategyId) -}}
{{- end }}
              value: {{ join "," $streams | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
