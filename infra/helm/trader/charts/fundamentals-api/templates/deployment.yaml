apiVersion: apps/v1
kind: Deployment
metadata:
  name: fundamentals-api
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fundamentals-api
  template:
    metadata:
      labels:
        app: fundamentals-api
    spec:
      containers:
        - name: fundamentals-api
          image: {{ .Values.image | default (printf "%strader-fundamentals-api:%s" (.Values.global.imageRegistry | default "") (.Values.global.imageTag | default "latest")) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8011
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            # Timescale (the bi-temporal `fundamentals` as-of READ surface — epic Task 7's write target).
            # Password from the secret, URL assembled like backtest-engine/fundamentals-ingestion so the
            # resolver points at trader_ts.
            - name: TIMESCALEDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: TIMESCALEDB_PASSWORD
            - name: TIMESCALE_URL
              value: "postgresql://trader:$(TIMESCALEDB_PASSWORD)@timescaledb-postgresql:5432/trader_ts"
            # Mongo coordinates (parity with the write-side service; the resolver itself reads Timescale,
            # but the var is wired so a future Mongo-backed surface surfaces a missing var at boot).
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb-headless:27017/trader?authSource=trader&directConnection=true"
            - name: MONGODB_DB
              value: trader
            # Redis read-through cache fronting the as-of resolver (mirrors pg-bar-reader.ts) AND the
            # consumer-side FX path for the Gap-2 PIT market cap: market-data-service publishes the GBP/USD
            # rate to fx:GBPUSD:lastGood here, which the MarketDataReader reads for fx_to_gbp. The Bitnami
            # Redis is `redis-master` and requires REDIS_PASSWORD (the same coordinates signal-service /
            # market-data-service / strategy-engine use) — REDIS_PASSWORD is declared BEFORE REDIS_URL so
            # the `$(…)` interpolation resolves. (The prior `redis://redis:6379` resolved to no service and
            # carried no password, so the FX read raised and USD market caps were silently dropped.)
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            # market-data-service base URL — the Gap-2 in-cluster reads (epic Task 12): the as-of adjusted
            # daily close (the SAME series momentum uses) for the PIT market cap, and the point-in-time
            # dividend-yield leg, both over the internal bars + /internal/api/dividend-yield endpoints with
            # an internal JWT. Same in-cluster default strategy-engine's MarketDataClient uses; JWT_SECRET
            # for the mint is already injected via the trader-secrets envFrom above.
            - name: MARKET_DATA_SERVICE_URL
              value: "http://market-data-service:3002"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "128Mi"
            limits:
              memory: "512Mi"
              ephemeral-storage: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8011
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8011
            initialDelaySeconds: 10
            periodSeconds: 10
