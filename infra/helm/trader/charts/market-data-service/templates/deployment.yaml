apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
    spec:
      containers:
        - name: market-data-service
          image: {{ .Values.image | default (printf "%strader-market-data-service:%s" (.Values.global.imageRegistry | default "") (.Values.global.imageTag | default "latest")) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            - name: LOG_LEVELS
              value: {{ .Values.global.env.logLevels | default "error,warn" | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: REDIS_PASSWORD
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb-headless:27017/trader?authSource=trader&directConnection=true"
            - name: TIMESCALEDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: TIMESCALEDB_PASSWORD
            # Hardcoded host/port/database/user matches the convention used for
            # MONGODB_URL above (which hardcodes `mongodb-headless:27017/trader`).
            # The Bitnami postgresql chart's Service is deterministically named
            # `<release>-postgresql`; the database + user come from the Terraform
            # helm_release settings (trader_ts / trader).
            - name: TIMESCALE_URL
              value: "postgresql://trader:$(TIMESCALEDB_PASSWORD)@timescaledb-postgresql:5432/trader_ts"
            - name: BARS_BACKEND
              value: {{ .Values.global.env.barsBackend | default "mongo" | quote }}
            - name: DUAL_WRITE_BARS
              value: {{ .Values.global.env.dualWriteBars | default "false" | quote }}
            - name: TRADING_MODE
              value: {{ .Values.global.env.tradingMode | default "Paper" | quote }}
            # Market-data upstream. twelvedata (default) | yahoo. TWELVEDATA_API_KEY itself
            # arrives via the trader-secrets envFrom above (same as the T212 keys).
            - name: MARKET_DATA_PROVIDER
              value: {{ .Values.global.env.marketDataProvider | default "twelvedata" | quote }}
            - name: DAILY_HISTORY_PROVIDER
              value: {{ .Values.global.env.dailyHistoryProvider | default "yahoo" | quote }}
            - name: DAILY_BACKFILL_YEARS
              value: {{ .Values.global.env.dailyBackfillYears | default "5" | quote }}
            # EODHD single universe source + fundamentals. EODHD_API_KEY arrives via the
            # trader-secrets envFrom above (same as TWELVEDATA_API_KEY / the T212 keys).
            - name: UNIVERSE_SOURCE
              value: {{ .Values.global.env.universeSource | default "curated" | quote }}
            - name: MIN_MARKET_CAP_GBP
              value: {{ .Values.global.env.minMarketCapGbp | default "5000000000" | quote }}
            - name: EODHD_CALLS_PER_MIN
              value: {{ .Values.global.env.eodhdCallsPerMin | default "1000" | quote }}
            - name: EODHD_DAILY_CALL_LIMIT
              value: {{ .Values.global.env.eodhdDailyCallLimit | default "90000" | quote }}
            - name: FUNDAMENTALS_PROVIDER
              value: {{ .Values.global.env.fundamentalsProvider | default "yahoo" | quote }}
            - name: EARNINGS_PROVIDER
              value: {{ .Values.global.env.earningsProvider | default "yahoo" | quote }}
            - name: QUOTE_PROVIDER
              value: {{ .Values.global.env.quoteProvider | default "eodhd" | quote }}
            - name: BAR_FREQUENCY
              value: {{ .Values.global.env.barFrequency | default "daily" | quote }}
            {{- with .Values.global.env.pollIntervalMs }}
            - name: POLL_INTERVAL_MS
              value: {{ . | quote }}
            {{- end }}
            - name: QUOTE_POLL_INTERVAL_MS
              value: {{ .Values.global.env.quotePollIntervalMs | default "3600000" | quote }}
            - name: SIGNAL_ORDER_TYPE
              value: {{ .Values.global.env.signalOrderType | default "Limit" | quote }}
            - name: ACTIVE_STRATEGY
              value: {{ .Values.global.env.activeStrategy | default "factor_rank_v1" | quote }}
            - name: GAP_THRESHOLD
              value: {{ .Values.global.env.gapThreshold | default "0.60" | quote }}
            - name: TICKER_UNIVERSE
              value: {{ .Values.global.env.tickerUniverse | quote }}
            {{- with .Values.global.env.universeMaxSize }}
            - name: UNIVERSE_MAX_SIZE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.global.env.universeIncludeUS }}
            - name: UNIVERSE_INCLUDE_US
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.global.env.universeIncludeLSE }}
            - name: UNIVERSE_INCLUDE_LSE
              value: {{ . | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
