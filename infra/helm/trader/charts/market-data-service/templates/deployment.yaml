apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
    spec:
      containers:
        - name: market-data-service
          image: {{ .Values.image | default "trader/market-data-service:latest" }}
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: REDIS_PASSWORD
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb:27017/trader"
            - name: TRADING_MODE
              value: {{ .Values.global.env.tradingMode | default "paper" | quote }}
            - name: BAR_FREQUENCY
              value: {{ .Values.global.env.barFrequency | default "daily" | quote }}
            {{- with .Values.global.env.pollIntervalMs }}
            - name: POLL_INTERVAL_MS
              value: {{ . | quote }}
            {{- end }}
            - name: EXECUTION_MODE
              value: {{ .Values.global.env.executionMode | default "t212" | quote }}
            - name: ACTIVE_STRATEGY
              value: {{ .Values.global.env.activeStrategy | default "factor_rank_v1" | quote }}
            - name: GAP_THRESHOLD
              value: {{ .Values.global.env.gapThreshold | default "0.60" | quote }}
            - name: TICKER_UNIVERSE
              value: {{ .Values.global.env.tickerUniverse | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
