apiVersion: apps/v1
kind: Deployment
metadata:
  name: fundamentals-ingestion
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fundamentals-ingestion
  template:
    metadata:
      labels:
        app: fundamentals-ingestion
    spec:
      containers:
        - name: fundamentals-ingestion
          image: {{ .Values.image | default (printf "%strader-fundamentals-ingestion:%s" (.Values.global.imageRegistry | default "") (.Values.global.imageTag | default "latest")) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8010
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            # Mongo (security-master-adjacent singletons + ingest job / quarantine bookkeeping). Same
            # assembly the other Python services use — password from the secret, URL composed here.
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb-headless:27017/trader?authSource=trader&directConnection=true"
            - name: MONGODB_DB
              value: trader
            # Timescale (the bi-temporal `fundamentals` write target — epic Task 7). Password from the
            # secret, URL assembled like backtest-engine's so the writer points at trader_ts.
            - name: TIMESCALEDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: TIMESCALEDB_PASSWORD
            - name: TIMESCALE_URL
              value: "postgresql://trader:$(TIMESCALEDB_PASSWORD)@timescaledb-postgresql:5432/trader_ts"
            # Redis — the `config:invalidated` cross-pod publish on a portal_fundamentals_config PUT
            # (mirrors market-data-service's live-config write). `redis-master` + REDIS_PASSWORD, the same
            # coordinates the other services use; declared BEFORE REDIS_URL so the $(VAR) interpolation
            # resolves. The publish is best-effort (a down Redis never fails the config write).
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            # SEC EDGAR requires a descriptive User-Agent on every request; the downloader (epic Task
            # 5) fails closed without it. Non-secret ENV-LAYER default — the portal can override it live
            # via portal_fundamentals_config (precedence override > this env > built-in default), so a
            # contact change needs no redeploy (the orchestrator resolves the effective UA per run).
            - name: EDGAR_USER_AGENT
              value: {{ .Values.global.env.edgarUserAgent | default "trader-platform fundamentals-ingestion" | quote }}
            # Coverage cap default the portal can override (portal_fundamentals_config.coverageCap). The
            # force-ingest run reads the effective cap; the env is the fallback. 0 ⇒ uncapped.
            - name: FUNDAMENTALS_COVERAGE_CAP
              value: {{ .Values.global.env.fundamentalsCoverageCap | default "64" | quote }}
            # Coverage mode (universe_plus_index | universe_only | index_only) — the force-ingest run's
            # full-coverage resolver reads it (mirrors the cron). Env-only (not portal-overridable today).
            - name: FUNDAMENTALS_COVERAGE
              value: {{ .Values.global.env.fundamentalsCoverage | default "universe_plus_index" | quote }}
            # SEC rate budget for the in-cluster force-ingest run's EDGAR clients (per source IP, shared
            # limiter across submissions + facts). Mirrors the cron; never raise above SEC's 10/s.
            - name: EDGAR_REQS_PER_SEC
              value: {{ .Values.global.env.edgarReqsPerSec | default "10" | quote }}
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "128Mi"
            limits:
              memory: "512Mi"
              ephemeral-storage: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 10
