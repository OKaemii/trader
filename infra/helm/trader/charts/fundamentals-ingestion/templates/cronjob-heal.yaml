# Self-heal PIT-fundamentals ingest (epic coverage-broaden Task 5).
#
# A SECOND, more frequent CronJob alongside the nightly full walk (cronjob.yaml). It runs
# `python -m src.ingest --heal`, which resolves the same coverage set but ingests ONLY the
# missing/stale curated-US subset (filtered via freshness.freshness_audit — the same per-name
# coverage+staleness query the `…/freshness` endpoint serves). So a newly-curated or stale name
# converges intra-day instead of waiting for the next nightly tick — the moving piece that keeps
# the "safe to retire Yahoo for US" freshness gate current without an operator force-run.
#
# Same image, same env block, same idempotent (hash-gated) write path as the nightly job — the
# only differences are the entrypoint (--heal), the cadence (6-hourly), a shorter deadline (the
# stale subset is small, so a heal pass should be quick; reap a wedged one sooner), and the
# FUNDAMENTALS_STALE_AFTER_DAYS knob that sizes the staleness window.
#
# Schedule:
#   global.env.fundamentalsHealCron (default "0 */6 * * *" = every 6h on the hour). The nightly
#   full walk stays the steady-state baseline; this is the convergence pass on top of it.
#
# Concurrency: Forbid — the ingest worker + the asyncpg pool are single-instance; a still-running
# heal (or an overlapping nightly walk) must not be stacked on. Both jobs being idempotent +
# Forbid means an overlap is harmless: the second to run no-ops the unchanged facts.
#
# EDGAR_USER_AGENT: MANDATORY. SEC fails closed without a descriptive UA — the run logs the
# misconfig and exits non-zero (the Job shows red) rather than silently writing nothing.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fundamentals-heal
  namespace: {{ .Release.Namespace }}
  labels:
    app: fundamentals-heal
spec:
  schedule: {{ .Values.global.env.fundamentalsHealCron | default "0 */6 * * *" | quote }}
  timeZone: "UTC"
  concurrencyPolicy: Forbid          # don't stack runs; a still-running heal/backfill skips this tick
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 1800       # missed the tick by >30min → skip rather than backfill-storm
  jobTemplate:
    spec:
      backoffLimit: 2
      # The heal subset is the missing/stale names only (typically a handful), so a pass is far
      # shorter than the nightly full walk — bound it to 1h so a wedged run is reaped well before
      # the next 6-hourly tick (the nightly job keeps the generous 6h ceiling for the full set).
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: fundamentals-heal
        spec:
          restartPolicy: Never
          containers:
            - name: fundamentals-heal
              image: {{ .Values.image | default (printf "%strader-fundamentals-ingestion:%s" (.Values.global.imageRegistry | default "") (.Values.global.imageTag | default "latest")) }}
              imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
              command: ["python", "-m", "src.ingest", "--heal"]
              envFrom:
                - secretRef:
                    name: trader-secrets
              env:
                # Mongo (coverage resolver: instrument_registry ∪ index_constituents). Same assembly the
                # Deployment + warehouse-snapshot use — password from the secret, URL composed here.
                - name: MONGODB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: trader-secrets
                      key: MONGODB_PASSWORD
                - name: MONGODB_URL
                  value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb-headless:27017/trader?authSource=trader&directConnection=true"
                - name: MONGODB_DB
                  value: trader
                # Timescale (the bi-temporal `fundamentals` write target + the freshness read). Password
                # from the secret, URL assembled like the Deployment/backtest-engine so it points at trader_ts.
                - name: TIMESCALEDB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: trader-secrets
                      key: TIMESCALEDB_PASSWORD
                - name: TIMESCALE_URL
                  value: "postgresql://trader:$(TIMESCALEDB_PASSWORD)@timescaledb-postgresql:5432/trader_ts"
                # SEC EDGAR — mandatory descriptive UA + the rate budget. Non-secret env.
                - name: EDGAR_USER_AGENT
                  value: {{ .Values.global.env.edgarUserAgent | default "trader-platform fundamentals-ingestion" | quote }}
                - name: EDGAR_REQS_PER_SEC
                  value: {{ .Values.global.env.edgarReqsPerSec | default "10" | quote }}
                # Coverage knobs (mode + cap). The heal run reads these to size the universe∪index set
                # before narrowing it to the stale subset — same values as the nightly walk.
                - name: FUNDAMENTALS_COVERAGE
                  value: {{ .Values.global.env.fundamentalsCoverage | default "universe_plus_index" | quote }}
                - name: FUNDAMENTALS_COVERAGE_CAP
                  value: {{ .Values.global.env.fundamentalsCoverageCap | default "64" | quote }}
                # Self-heal staleness window (days). A covered name whose freshest fiscal period is older
                # than this is re-ingested. Default 135 ≈ a reporting quarter + a filing-grace buffer.
                - name: FUNDAMENTALS_STALE_AFTER_DAYS
                  value: {{ .Values.global.env.fundamentalsStaleAfterDays | default "135" | quote }}
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                  ephemeral-storage: "128Mi"
                limits:
                  memory: "768Mi"
                  ephemeral-storage: "256Mi"
