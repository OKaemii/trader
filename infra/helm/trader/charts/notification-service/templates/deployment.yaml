apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: {{ .Values.image | default (printf "%strader-notification-service:%s" (.Values.global.imageRegistry | default "") (.Values.global.imageTag | default "latest")) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 3004
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            - name: LOG_LEVELS
              value: {{ .Values.global.env.logLevels | default "error,warn" | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: REDIS_PASSWORD
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb-headless:27017/trader?authSource=trader&directConnection=true"
            - name: TRADING_MODE
              value: {{ .Values.global.env.tradingMode | default "Paper" | quote }}
            - name: ACTIVE_STRATEGY
              value: {{ .Values.global.env.activeStrategy | default "factor_rank_v1" | quote }}
            # Operator override for intraday strategies' reporting cadence. One of
            # `hourly` (default) | `four_hourly` | `eod`. Daily strategies (declared
            # `per_cycle`) ignore this — see CycleAnalysisBatcher.resolveEffectiveCadence.
            - name: REPORT_INTRADAY_CADENCE
              value: {{ .Values.global.env.reportIntradayCadence | default "hourly" | quote }}
            # Peer-service URLs for the analysis-email telemetry path. signal-service
            # supplies the telemetry-snapshot endpoint (realised P&L, lifecycle counters,
            # decay state); market-data-service supplies the sectors map used for
            # universe-coverage telemetry. Both default to k8s service DNS — kept
            # explicit here so deploys are grep-able.
            - name: SIGNAL_SERVICE_URL
              value: "http://signal-service:3003"
            - name: MARKET_DATA_SERVICE_URL
              value: "http://market-data-service:3002"
            - name: PORTAL_BASE_URL
              value: {{ .Values.global.env.portalBaseUrl | default "http://trader.local" | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
