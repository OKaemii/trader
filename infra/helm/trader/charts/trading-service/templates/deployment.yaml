apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: trading-service
  template:
    metadata:
      labels:
        app: trading-service
    spec:
      containers:
        - name: trading-service
          image: {{ .Values.image | default "trader/trading-service:latest" }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb:27017/trader"
            - name: TRADING_MODE
              value: paper
            - name: ACTIVE_STRATEGY
              value: factor_rank_v1
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
