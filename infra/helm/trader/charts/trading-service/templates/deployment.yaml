apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: trading-service
  template:
    metadata:
      labels:
        app: trading-service
    spec:
      containers:
        - name: trading-service
          image: {{ .Values.image | default "trader/trading-service:latest" }}
          imagePullPolicy: Never
          ports:
            - containerPort: 3005
          envFrom:
            - secretRef:
                name: trader-secrets
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: REDIS_PASSWORD
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: MONGODB_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master:6379"
            - name: MONGODB_URL
              value: "mongodb://trader:$(MONGODB_PASSWORD)@mongodb:27017/trader"
            - name: TRADING_MODE
              value: {{ .Values.global.env.tradingMode | default "paper" | quote }}
            - name: ACTIVE_STRATEGY
              value: {{ .Values.global.env.activeStrategy | default "factor_rank_v1" | quote }}
            - name: EXECUTION_MODE
              value: {{ .Values.global.env.executionMode | default "t212" | quote }}
            - name: FILL_POLL_INTERVAL_MS
              value: {{ .Values.global.env.fillPollIntervalMs | default "30000" | quote }}
            - name: ORDER_MIN_INTERVAL_MS
              value: {{ .Values.global.env.orderMinIntervalMs | default "1100" | quote }}
            - name: ACCOUNT_CACHE_TTL_MS
              value: {{ .Values.global.env.accountCacheTtlMs | default "30000" | quote }}
            - name: ORDER_MAX_ATTEMPTS
              value: {{ .Values.global.env.orderMaxAttempts | default "5" | quote }}
            - name: QUEUE_TTL_MS
              value: {{ .Values.global.env.queueTtlMs | default "3600000" | quote }}
            - name: PRICE_DRIFT_TOLERANCE
              value: {{ .Values.global.env.priceDriftTolerance | default "0.01" | quote }}
            - name: SIGNAL_SERVICE_URL
              value: "http://signal-service:3003"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
