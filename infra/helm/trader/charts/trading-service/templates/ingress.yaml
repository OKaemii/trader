apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trading-service
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: trader.local
      http:
        paths:
          - path: /admin/api/trading
            pathType: Prefix
            backend:
              service:
                name: trading-service
                port:
                  number: 3005
