global:
  namespace: trader
  imageRegistry: ""
  imagePullPolicy: IfNotPresent
  env:
    # ---- Observability ----
    # OTLP collector endpoint for distributed tracing. Empty = tracing disabled (no-op);
    # set to e.g. "http://otel-collector.observability:4318/v1/traces" once a Tempo/Jaeger
    # collector is stood up. Logger emits traceId/spanId on every line when active.
    otelCollectorUrl: ""
    # Log-level allowlist for every TS service. The packages/core logger filters by
    # this set — comma-separated, any subset of {error,warn,info,profile}. `profile`
    # is the new low-importance tier (health probes / heartbeats / idle ticks); keep
    # it out of the allowlist unless you're actively debugging. Default ships
    # error+warn only — `info` is suppressed so the dispatcher / fills-poller idle
    # chatter doesn't drown out the signal.
    logLevels: "error,warn"

    # Single source of truth for all service-tunable env vars. Lives under `global` so subchart
    # deployment templates can read `.Values.global.env.*` directly. Bump these and redeploy —
    # no code change required for any of the toggles documented in CLAUDE.md.
    tradingMode: Demo                   # Paper (notify only) | Demo (demo.trading212) | Live (trading212; admin gate required)
    signalOrderType: Market             # Limit (T212-friendly, weekly) | Market (immediate fill, daily). Risk-exits always Market. Paired with barFrequency=intraday — 15m signals can't sit on limit orders.
    barFrequency: intraday                 # daily | intraday
    # Live bar-storage backend selector. `mongo` (default) keeps the existing path; `timescale`
    # flips the shared-bars dispatcher onto the new Timescale hypertable.
    #
    # ⚠  DO NOT flip to `timescale` without running this sequence first:
    #
    #   1. Deploy Timescale chart (terraform apply with the trader-app module's
    #      helm_release.timescaledb already in place — Task 1).
    #   2. Wait for the timescale-init Helm hook job to apply the schema migrations
    #      (Task 4). Verify with: kubectl logs job/timescale-init -n trader
    #   3. Set dualWriteBars="true" (below). Redeploy market-data-service. Live polls
    #      and admin backfills now write both stores; verification job catches drift.
    #   4. Wait ≥48h with zero rows in the Mongo dual_write_failures collection AND
    #      zero mismatches from the equivalence verification job.
    #   5. Run the Mongo→Timescale backfill migration (Task 14):
    #        pnpm tsx infra/migrations/2026-05-23-bars-mongo-to-timescale.ts
    #   6. NOW flip this value to `timescale`. terraform apply rolls each consumer
    #      Deployment (signal/trading/portfolio/backtest) to the new backend.
    #   7. Watch signal-service logs for read errors for one week; keep dualWriteBars=true
    #      throughout so Mongo stays current as a rollback target.
    #   8. After that week, flip dualWriteBars="false" and (Task 20) drop Mongo
    #      ohlcv_bars.
    #
    # Rollback: if reads break after this flip, set back to `mongo` and redeploy —
    # Mongo is still being dual-written, so the data is current.
    #
    # See agent-docs/plans/three-database-split.md §Cutover.
    barsBackend: mongo                  # mongo | timescale
    # Migration-window toggle: when true, market-data-service writes every bar to BOTH Mongo
    # AND Timescale (best-effort on the PG side — Mongo failures fail the request; PG failures
    # log to the dual_write_failures collection without affecting the Mongo write). Default
    # off so production keeps single-writing to Mongo until the operator deliberately enables
    # the cutover sequence.
    dualWriteBars: "true"               # "true" enables Timescale dual-write
    # Default polling cadence for market-data-service live polling. Must be one of the
    # active provider's allowedPollIntervals (Yahoo: 15m / 1h / 24h). The portal renders
    # the dropdown from those values; this default is what new deploys land on before
    # any operator override.
    # 86_400_000 = 24h. fetchRecent pulls a 24h window per call so this gives one poll
    # per day with full coverage — appropriate for a daily strategy. Portal override
    # (portal_market_config in Mongo) takes precedence at runtime.
    pollIntervalMs: "86400000"
    # Fills poller cadence in trading-service (only active when tradingMode != paper).
    # 30s strikes a balance between freshness for the portal Order/Signal lifecycle view and
    # T212 rate limits; tighten only if you find yourself watching fills in real time.
    fillPollIntervalMs: "30000"
    # ---- Order-dispatcher (trading-service) knobs ----
    # The dispatcher drains the signal queue (lifecycle='queued') one row at a time, throttling
    # T212 calls to avoid 429s. See CLAUDE.md "Order dispatcher" for the full state machine.
    orderMinIntervalMs:   "1100"          # min ms between T212 placeOrder calls
    accountCacheTtlMs:    "30000"         # cash/positions snapshot TTL (in-process)
    orderMaxAttempts:     "5"             # attempts cap → lifecycle=failed/retries_exhausted
    queueTtlMs:           "3600000"       # signal age cap (1h daily); past this → queue_expired
    priceDriftTolerance:  "0.01"          # 1% absolute price drift → market_drift (terminal)
    activeStrategy: factor_rank_v1      # factor_rank_v1 | sector_momentum_v1 | topology_v1
    volTarget: "0.10"                   # portfolio vol target (signal-service)
    minActionableConfidence: "0.50"     # min confidence to emit a BUY TradeSignal. Raised from 0.30 to cut low-conviction noise and concentrate on stronger picks. SELLs that reduce/exit a held position bypass this floor — exits are portfolio-driven, not conviction-driven.
    # Confidence-math calibration. See services/signal-service/src/modules/signals/application/GenerateSignals.ts.
    # minPositivePeers: below this many positive composite scores, the p95 divisor falls back to an absolute 1.0
    #   (prevents singleton-positive pinning to 100%). minScoreEpsilon: |composite_score| floor — below this,
    #   confidence is forced to 0 (drops factor-collapse noise even on healthy cross-sections).
    minPositivePeers:       "5"
    minScoreEpsilon:        "0.1"
    # Notification-service operator override for intraday strategies' reporting cadence.
    # See services/notification-service/src/modules/analysis/application/CycleAnalysisBatcher.ts.
    # hourly (default) | four_hourly | eod. Daily strategies (declared 'per_cycle') ignore this.
    reportIntradayCadence:  "hourly"
    # Raised from 0.20: demo T212 universe contains ETPs/small-caps with no Yahoo Finance equivalent.
    # Lower back to 0.20 once a real-data universe (standard tickers only) is in use.
    gapThreshold: "0.60"
    # Fallback universe used when T212 instruments API is unavailable (rate-limited, auth failure, etc.).
    # Also the seed on a fresh deployment before the monthly T212 refresh succeeds.
    # Tickers use T212's suffixed form so order placement and position reconciliation match
    # T212's payload format directly. Yahoo translation handles the suffix via
    # yahoo-client.parseT212Ticker (`_US_EQ` → bare, `l_EQ` → `.L`, etc.). META retains its
    # T212 legacy `FB_US_EQ` symbol; the SYMBOL_RENAMES map in yahoo-client.ts rewrites it
    # to Yahoo's `META`.
    tickerUniverse: "AAPL_US_EQ,MSFT_US_EQ,GOOGL_US_EQ,AMZN_US_EQ,NVDA_US_EQ,FB_US_EQ,TSLA_US_EQ,JPM_US_EQ,JNJ_US_EQ,UNH_US_EQ,V_US_EQ,PG_US_EQ,MA_US_EQ,HD_US_EQ,CVX_US_EQ,MRK_US_EQ,ABBV_US_EQ,PEP_US_EQ,KO_US_EQ,AVGO_US_EQ,LLY_US_EQ,COST_US_EQ,MCD_US_EQ,BAC_US_EQ,TMO_US_EQ,ABT_US_EQ,WMT_US_EQ,CSCO_US_EQ,XOM_US_EQ,CRM_US_EQ,ACN_US_EQ,DHR_US_EQ,NEE_US_EQ,INTC_US_EQ,NFLX_US_EQ,AMD_US_EQ,QCOM_US_EQ,TXN_US_EQ,INTU_US_EQ,CAT_US_EQ,HON_US_EQ,AMGN_US_EQ,SBUX_US_EQ,IBM_US_EQ,GILD_US_EQ,AXP_US_EQ,GS_US_EQ,MS_US_EQ,BLK_US_EQ,SPGI_US_EQ,SGLNl_EQ,IUKDl_EQ,SUPRl_EQ,SRSAl_EQ,VFEMl_EQ,XUSEl_EQ,SSLNl_EQ"
    # Max active universe size. Bumping invalidates prior backtest_results — re-run validation
    # before re-enabling topology_v1 or any go-live gate (see CLAUDE.md / Research page).
    universeMaxSize: "200"
    # Curated candidate pool — bare symbols, resolved against T212 instruments at refresh time.
    # US list expected to use `_US_EQ` form in T212; LSE list uses primary listing `l_EQ` GBP/GBX.
    # Symbols T212 doesn't carry are silently skipped (logged on refresh). Verify against current
    # index constituents quarterly — these snapshots drift. Set both empty to disable curated mode
    # and fall back to the legacy "first N from T212" selection.
    universeIncludeUS: "AAPL,ABBV,ABT,ACN,ADBE,AIG,AMD,AMGN,AMT,AMZN,AVGO,AXP,BA,BAC,BK,BKNG,BLK,BMY,BRKB,C,CAT,CHTR,CL,CMCSA,COF,COP,COST,CRM,CSCO,CVS,CVX,DE,DHR,DIS,DOW,DUK,EMR,F,FDX,GD,GE,GILD,GM,GOOG,GOOGL,GS,HD,HON,IBM,INTC,INTU,ISRG,JNJ,JPM,KHC,KMI,KO,LIN,LLY,LMT,LOW,MA,MCD,MDLZ,MDT,META,MMM,MO,MRK,MS,MSFT,NEE,NFLX,NKE,NVDA,ORCL,PEP,PFE,PG,PM,PYPL,QCOM,RTX,SBUX,SCHW,SO,SPG,T,TGT,TMO,TMUS,TSLA,TXN,UNH,UNP,UPS,USB,V,VZ,WBA,WFC,WMT,XOM"
    universeIncludeLSE: "AAL,ABF,ADM,AHT,ANTO,AUTO,AV,AZN,BARC,BATS,BDEV,BEZ,BKG,BME,BNZL,BP,BRBY,CCH,CNA,CRDA,CRH,CTEC,DGE,DPLM,DSV,EDV,ENT,EXPN,EZJ,FCIT,FRAS,FRES,GLEN,GSK,HIK,HL,HLN,HSBA,HWDN,IAG,IHG,III,IMB,IMI,INF,ITRK,JD,KGF,LAND,LGEN,LLOY,LMP,LSEG,MNDI,MNG,MRO,NG,NWG,NXT,PHNX,PRU,PSH,PSN,PSON,RIO,RKT,RMV,RR,RTO,SBRY,SDR,SGE,SGRO,SHEL,SMDS,SMIN,SMT,SN,SPX,SSE,STAN,STJ,SVT,TSCO,TW,ULVR,UTG,UU,VOD,WEIR,WPP,WTB"

  # WP2: strategy-engine runs one pod per tuple. The strategy-engine subchart loops over
  # this list. Lives under `global` so the subchart sees it without explicit import.
  # - 5m worker consumes market:raw:5m every cycle; tracks intraday regime.
  # - daily worker consumes market:raw:daily once per (market, UTC-date) at session close.
  # Each worker writes to its own output stream `signals:strategy:{mode}:{strategyId}`
  # which signal-service multiplexes onto its consumer loop.
  # Add/remove entries to scale strategy count; replicas:0 takes a worker offline cleanly.
  # `primaryStrategy` picks which worker the legacy `strategy-engine` Service alias points
  # at — keeps the portal and any other in-cluster caller working without ingress rewrites.
  strategies:
    - mode:         "5m"
      barFrequency: "intraday"
      strategyId:   "factor_rank_v1"
      replicas:     1
    - mode:         "daily"
      barFrequency: "daily"
      strategyId:   "factor_rank_v1"
      # WP3: KEDA scale-to-zero. Worker idles at 0 replicas until a daily bar lands on
      # `market:raw:daily`; KEDA spins it up, processes, scales back down after the
      # cooldown. `replicas:` is omitted intentionally — KEDA owns the count when this
      # flag is set. See charts/strategy-engine/templates/scaledobject.yaml.
      scaleToZero:     true
      cooldownSeconds: 300
  primaryStrategy: "5m-factor_rank_v1"

redis:
  host: redis-master
  port: 6379

mongodb:
  host: mongodb
  port: 27017
  database: trader

# Bitnami postgresql chart with the timescale/timescaledb image — the live
# time-series + append-only audit store. See agent-docs/plans/three-database-split.md.
# Deployment lives in infra/terraform/modules/trader-app/main.tf (sibling helm_release,
# same pattern as mongodb/redis above). The password is injected by k8s-bootstrap
# into the trader-secrets Secret under TIMESCALEDB_PASSWORD; consumer Deployments
# read it via secretKeyRef (added in three-database-split task 11). The full URL is
# assembled service-side from {host, port, database, user, $TIMESCALEDB_PASSWORD}.
timescaledb:
  host: timescaledb-postgresql
  port: 5432
  database: trader_ts
  user: trader

ingress:
  host: trader.local
  className: nginx

services:
  authService:
    replicaCount: 1
    image: trader/auth-service:latest
    port: 3001
  marketDataService:
    replicaCount: 1
    image: trader/market-data-service:latest
    port: 3002
  strategyEngine:
    replicaCount: 1
    image: trader/strategy-engine:latest
    port: 8000
  signalService:
    replicaCount: 1
    image: trader/signal-service:latest
    port: 3003
  notificationService:
    replicaCount: 1
    image: trader/notification-service:latest
    port: 3004
  tradingService:
    replicaCount: 1
    image: trader/trading-service:latest
    port: 3005
  portfolioService:
    replicaCount: 1
    image: trader/portfolio-service:latest
    port: 3006
  backtestEngine:
    replicaCount: 1
    image: trader/backtest-engine:latest
    port: 8001
  # Warehouse-snapshotter has no replicaCount/port — it runs only as the
  # warehouse-snapshot CronJob (templates/warehouse-snapshot-cronjob.yaml).
  # Image tag matches the convention of the other services so build-images.sh
  # can produce it the same way.
  warehouseSnapshotter:
    image: trader/warehouse-snapshotter:latest
  frontendWeb:
    replicaCount: 1
    image: trader/frontend-web:latest
    port: 3007

