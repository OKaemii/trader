name: Build & Deploy

# On every push to master: build all 10 service images, push them to private GHCR
# tagged with the commit SHA, then deploy to the homeserver k3s via `helm upgrade`
# pinned to that SHA.
#
# Image naming:  ghcr.io/<owner>/trader-<service>:<sha>   (+ a floating :latest)
# Deploy owner:  the trader-app helm release. Terraform created it but no longer
#                reconciles it (lifecycle.ignore_changes = all) — this workflow is
#                the source of truth for app rollouts. See
#                agent-docs/plans/github-releases-ci-cd.md.

on:
  push:
    branches: [master]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  OWNER: okaemii # GHCR paths must be lowercase

concurrency:
  # Never let two deploys race; a newer push supersedes an in-flight older one.
  group: build-deploy-master
  cancel-in-progress: false

jobs:
  build:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # 6 Node/TS services share one Dockerfile, selected by the SERVICE build-arg.
          - service: auth-service
            dockerfile: infra/docker/node-service.Dockerfile
            build_args: SERVICE=auth-service
          - service: market-data-service
            dockerfile: infra/docker/node-service.Dockerfile
            build_args: SERVICE=market-data-service
          - service: signal-service
            dockerfile: infra/docker/node-service.Dockerfile
            build_args: SERVICE=signal-service
          - service: notification-service
            dockerfile: infra/docker/node-service.Dockerfile
            build_args: SERVICE=notification-service
          - service: trading-service
            dockerfile: infra/docker/node-service.Dockerfile
            build_args: SERVICE=trading-service
          - service: portfolio-service
            dockerfile: infra/docker/node-service.Dockerfile
            build_args: SERVICE=portfolio-service
          # Python services (depend on packages/quant-core; context = repo root).
          - service: strategy-engine
            dockerfile: infra/docker/strategy-engine.Dockerfile
            build_args: ""
          - service: backtest-engine
            dockerfile: infra/docker/backtest-engine.Dockerfile
            build_args: ""
          # Bun/Next.js portal.
          - service: frontend-web
            dockerfile: infra/docker/frontend-web.Dockerfile
            build_args: ""
          # One-shot warehouse snapshotter (CronJob image).
          - service: warehouse-snapshotter
            dockerfile: infra/docker/warehouse-snapshotter.Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/trader-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/trader-${{ matrix.service }}:latest
          # Shared GH Actions layer cache, scoped per service so they don't evict
          # each other (the 6 node images otherwise share a cache key and thrash).
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to homeserver k3s
    needs: build
    runs-on: [self-hosted, homeserver]
    steps:
      - uses: actions/checkout@v4
      # helm + kubectl + a kubeconfig for the k3s cluster must already be present on
      # the self-hosted runner (the dedicated github-runner user).
      - name: helm upgrade (SHA-pinned)
        run: |
          helm upgrade --install trader-app ./infra/helm/trader \
            --namespace trader \
            --set global.imageTag=${{ github.sha }} \
            --wait --timeout 15m
